# nginx inheritance gotcha: add_header at a `location` level overrides ALL
# add_header from the parent `server` block. Anywhere we add a header for a
# specific route we have to re-declare the shared ones too.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;

    # SharedArrayBuffer (used by @openmeteo/file-reader) requires a
    # cross-origin-isolated context. Without these headers the file-reader
    # can't decode OMfiles → no weather layers render.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # Bundles hash-named — safe to cache long.
    location /_app/immutable/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
    }

    # Runtime config is regenerated at every container start; never cache.
    location = /runtime-config.js {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Contours départements : asset stable, non hashé, régénéré très rarement.
    # Navigateur 7 j + edge 1 an (s-maxage, si CDN devant) + revalidation en
    # arrière-plan. Pas d'`immutable` : chemin non hashé → éviter de figer une
    # version périmée. Miroir de la règle `static/_headers` (Cloudflare Pages).
    # Pas d'`expires` ici, sinon nginx ajoute un 2e Cache-Control concurrent.
    location = /departements.geojson {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "public, max-age=604800, s-maxage=31536000, stale-while-revalidate=2592000" always;
        default_type application/geo+json;
    }

    # Manifeste PWA : type MIME correct (sinon nginx sert octet-stream) + cache
    # court navigateur. Miroir de la règle `static/_headers` (Cloudflare Pages).
    location = /site.webmanifest {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Cache-Control "public, max-age=604800" always;
        default_type application/manifest+json;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
